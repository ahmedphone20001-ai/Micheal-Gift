<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Windows Security</title>
<style>
body{
    margin:0;
    background:#000;
    color:#00ff00;
    font-family:Consolas,monospace;
    overflow:hidden;
}
#terminal{
    padding:20px;
    font-size:22px;
    white-space:pre-line;
}
</style>
</head>
<body>

<div id="terminal"></div>

<script>
const lines = [
"Connecting to Windows Security...",
"Scanning C:\\Users\\...",
"Checking system files...",
"⚠ Suspicious files detected!",
"Deleting memes...",
"نجيب رقم امك",
"Deleting Minecraft saves...",
"Deleting Steam library...",
"Fucking Jolie...",
"",
"KOS OMK YA 3ARS"
    <img id="photo" src="https://media.discordapp.net/attachments/1510701961513668613/1524933876927954965/684154593_18081985112432143_5490550953052062177_n.png?ex=6a518cd8&is=6a503b58&hm=2d22dd0f01c5113b2f14deac9de0fde8f1f0c241da0f10017080ca255920c87c&=&format=webp&quality=lossless" alt="Photo">
    
];

let i = 0;
const terminal = document.getElementById("terminal");

function typeLine() {
    if (i < lines.length) {
        terminal.innerHTML += lines[i] + "\n";
        i++;
        setTimeout(typeLine, 900);
    }
}

typeLine();
</script>
